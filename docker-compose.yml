services:
  mongo:
    image: mongo:7
    container_name: competitions-mongo
    restart: unless-stopped
    volumes:
      - competitions-mongo-data:/data/db

  competitions:
    build:
      context: .
    container_name: competitions
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./data:/code/data
    depends_on:
      - mongo
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthcheck', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  competitions-mongo-data:
