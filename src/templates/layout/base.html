<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Соревнования студентов | СибАДИ</title>
    <link rel="icon" type="image/x-icon" href="/static/icons/favicon.png">

    <link rel="stylesheet" href="/static/libs/styles/bootstrap.min.css">
    <link rel="stylesheet" href="/static/libs/styles/datepicker.min.css">
    <link rel="stylesheet" href="/static/libs/styles/nice-select2.min.css">
    <link rel="stylesheet" href="/static/styles/main.css">
</head>

<body>

    <div style="margin: 20px 20px">
        {% if request.ctx.auth_user %}
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                Пользователь: <strong>{{ request.ctx.auth_user.username }}</strong>
                ({{ request.ctx.auth_user.role }})
            </div>
            <form action="/logout" method="post">
                <button class="btn btn-outline-secondary btn-sm" type="submit">Выйти</button>
            </form>
        </div>
        {% endif %}

        {% block content %}
        {% endblock content %}
    </div>


    <script src="/static/libs/scripts/bootstrap.min.js"></script>
    <script src="/static/libs/scripts/datepicker.min.js"></script>
    <script src="/static/libs/scripts/nice-select2.min.js"></script>
    <script src="/static/scripts/script.js"></script>
</body>

</html>
